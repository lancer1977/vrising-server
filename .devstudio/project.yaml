schema: 1
project:
  name: DS-vrising
  kind: docker-game-server
  owner: lancer1977

languages:
  - shell
  - dockerfile
  - json

frameworks:
  - docker
  - docker-compose
  - steamcmd
  - wine
  - vrising

validation:
  validate: bash scripts/validate.sh
  docker_build: docker build -t vrising-server:latest .
  compose_config: docker compose -f docker-compose.yml config --quiet

tracking:
  primary: repo-local
  current_work: 00_agile/dashboard.md

docs:
  index: docs/README.md
  features: docs/features/README.md
  version_coverage: docs/features/version-coverage-map.md
  roadmap: docs/roadmaps/README.md

devstudio:
  runtime_model: three-agent
  backlog_ordering: filename
  skip_promoted_planning: true
  one_stage_per_run: true
