map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    server_tokens off;
    client_max_body_size 16m;

    # Docker's embedded DNS resolver keeps the upstream reachable across restarts.
    resolver 127.0.0.11 ipv6=off valid=10s;
    set $app_upstream app:8080;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_redirect off;

    # If the repo later mounts built static assets into /usr/share/nginx/html,
    # Nginx will serve them first and fall back to the app when a file does not exist.
    root /usr/share/nginx/html;
    index index.html;

    location = /health {
        proxy_pass http://$app_upstream;
        proxy_set_header Connection "";
        access_log off;
    }

    location /hubs/ {
        proxy_pass http://$app_upstream;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    location /api/ {
        proxy_pass http://$app_upstream;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/ @app;
    }

    location @app {
        proxy_pass http://$app_upstream;
        proxy_read_timeout 60s;
    }
}
